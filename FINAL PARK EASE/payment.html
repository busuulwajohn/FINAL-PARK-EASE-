<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ParkEase | Service Activity</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect rx='20' width='100' height='100' fill='%23ff7a59'/>
<text x='50' y='57' font-size='48' text-anchor='middle'
fill='white' font-family='algerian'>PA</text></svg>">

<link rel="stylesheet" href="payment.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="activity-page">

<header class="activity-header">
<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h2>
<i class="fa-solid fa-wave-square"></i>
Service Activity
</h2>
</header>

<div class="search-bar">
<i class="fa-solid fa-search"></i>
<input type="text" id="searchInput"
placeholder="Search by Transaction ID, Service or Date">
</div>

<div class="filters">
<button class="filter active" data-type="all">All</button>
<button class="filter" data-type="parking">Parking</button>
<button class="filter" data-type="washing">Washing</button>
<button class="filter" data-type="charging">Charging</button>
<button class="filter" data-type="booking">Booking</button>
</div>

<div class="summary">
<p>Total (<span id="transactionCount">0</span> transactions)</p>
<h2 id="totalAmount">UGX 0</h2>
</div>

<div id="activityList" class="activity-list"></div>

</div>

<script src="paymentact.js"></script>
<script src="accountss-preview.js"></script>

</body>
</html>
